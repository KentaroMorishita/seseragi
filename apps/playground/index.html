<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0b1110" />
    <meta
      name="description"
      content="Rust compilerと同じdriverで動くSeseragi Playground"
    />
    <title>Seseragi Playground</title>
  </head>
  <body>
    <div id="app" class="app-shell">
      <header class="topbar">
        <div class="brand">
          <div>
            <strong>Seseragi</strong>
            <span>Playground</span>
          </div>
        </div>
        <div class="topbar-actions">
          <button
            id="sample-browser-button"
            class="sample-browser-button"
            type="button"
            aria-haspopup="dialog"
            aria-controls="sample-browser-dialog"
            aria-expanded="false"
          >
            <span id="current-sample-level" class="sample-browser-level">初級 01</span>
            <span id="current-sample-title" class="sample-browser-title">Hello world</span>
            <span class="sample-browser-chevron" aria-hidden="true">⌄</span>
          </button>
          <div class="toolbar" role="toolbar" aria-label="Playground tools">
            <button
              id="stdin-toggle-button"
              class="toolbar-button"
              type="button"
              aria-controls="input-section"
              aria-pressed="false"
              title="標準入力パネルを表示"
            >
              <span aria-hidden="true">⌨</span>
              <span class="toolbar-label">Stdin</span>
            </button>
            <button
              id="reset-sample-button"
              class="toolbar-button"
              type="button"
              title="選択中のサンプルを初期状態に戻す"
            >
              <span aria-hidden="true">↺</span>
              <span class="toolbar-label">Reset</span>
            </button>
          </div>
          <button id="run-button" class="run-button" type="button">
            <span aria-hidden="true">▶</span>
            <span>Run</span>
            <kbd>⌘↵</kbd>
          </button>
        </div>
      </header>

      <dialog
        id="sample-browser-dialog"
        class="sample-browser-dialog"
        aria-labelledby="sample-browser-title"
      >
        <div class="sample-browser-dialog-header">
          <div>
            <span class="sample-browser-kicker">LEARNING PATH</span>
            <h2 id="sample-browser-title">Seseragiを学ぶ</h2>
            <p>上から順に進めても、知りたいtopicから始めても大丈夫です。</p>
          </div>
          <button
            id="sample-browser-close"
            class="sample-browser-close"
            type="button"
            aria-label="サンプル一覧を閉じる"
          >×</button>
        </div>
        <div id="sample-browser-groups" class="sample-browser-groups"></div>
      </dialog>

      <nav class="mobile-tabs" aria-label="Playground panels">
        <button type="button" data-panel-target="code" aria-pressed="true">Code</button>
        <button
          type="button"
          data-panel-target="io"
          aria-label="Input / Output"
          aria-pressed="false"
        >
          I/O
        </button>
      </nav>

      <main class="workspace" data-mobile-panel="code">
        <section
          id="editor-panel"
          class="editor-panel"
          aria-label="Seseragi editor"
        >
          <div class="panel-heading">
            <div>
              <span class="status-dot" id="status-dot"></span>
              <span id="status-text">Rust compiler ready</span>
            </div>
            <div class="panel-heading-actions">
              <span class="file-name">main.ssrg</span>
              <button
                id="sample-guide-button"
                class="text-button guide-button"
                type="button"
                aria-expanded="false"
                aria-controls="sample-guide"
                title="このサンプルの説明"
              >
                <span aria-hidden="true">?</span>
                <span class="guide-button-label">Guide</span>
              </button>
              <button
                id="clear-source-button"
                class="text-button"
                type="button"
                aria-label="本文をクリア"
              >
                Clear
              </button>
            </div>
          </div>
          <aside
            id="sample-guide"
            class="sample-guide"
            role="dialog"
            aria-labelledby="sample-guide-title"
            hidden
          >
            <div class="sample-guide-heading">
              <span id="sample-guide-category"></span>
              <button
                id="sample-guide-close"
                type="button"
                aria-label="サンプルガイドを閉じる"
              >×</button>
            </div>
            <h2 id="sample-guide-title"></h2>
            <p id="sample-guide-summary"></p>
            <ul id="sample-guide-concepts" aria-label="学べる要素"></ul>
            <code id="sample-guide-source"></code>
          </aside>
          <div id="editor" class="editor-host"></div>
        </section>

        <div
          id="workspace-resizer"
          class="panel-resizer panel-resizer--vertical"
          role="separator"
          aria-label="コードとI/Oの幅を変更"
          aria-valuemin="0"
          aria-valuemax="100"
          aria-orientation="vertical"
          aria-controls="editor-panel io-panel"
          tabindex="0"
        ></div>

        <aside
          id="io-panel"
          class="io-panel"
          aria-label="Program input and output"
        >
          <section id="input-section" class="input-section">
            <div class="panel-heading">
              <span>Stdin</span>
              <span class="hint">必要な場合のみ</span>
            </div>
            <textarea
              id="stdin-input"
              rows="4"
              spellcheck="false"
              aria-label="標準入力"
              placeholder="プログラムへ渡す標準入力"
            ></textarea>
          </section>
          <div
            id="io-resizer"
            class="panel-resizer panel-resizer--horizontal"
            role="separator"
            aria-label="標準入力と出力の高さを変更"
            aria-valuemin="0"
            aria-valuemax="100"
            aria-orientation="horizontal"
            aria-controls="input-section output-section"
            tabindex="0"
          ></div>
          <section id="output-section" class="output-section">
            <div class="panel-heading">
              <span>Output</span>
              <div class="output-heading-actions">
                <div class="output-view-toggle" aria-label="出力表示">
                  <button
                    id="show-text-output-button"
                    type="button"
                    aria-pressed="true"
                  >Text</button>
                  <button
                    id="show-html-preview-button"
                    type="button"
                    aria-pressed="false"
                  >Preview</button>
                </div>
                <button id="clear-output-button" class="text-button" type="button">
                  Clear
                </button>
              </div>
            </div>
            <div class="output-content">
              <pre id="output" tabindex="0" aria-live="polite">Runを押すと結果がここに表示されます。</pre>
              <iframe
                id="html-preview"
                title="Seseragi HTML preview"
                sandbox="allow-same-origin allow-scripts"
                referrerpolicy="no-referrer"
                hidden
              ></iframe>
            </div>
          </section>
        </aside>
      </main>

      <footer>
        <span>Shared Rust driver · WASM · browser runtime</span>
        <a href="https://github.com/KentaroMorishita/seseragi">GitHub</a>
      </footer>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
