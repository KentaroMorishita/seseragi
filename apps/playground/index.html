<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0b1110" />
    <meta
      name="description"
      content="Rust compilerと同じdriverで動くSeseragi Playground"
    />
    <title>Seseragi Playground</title>
  </head>
  <body>
    <div id="app" class="app-shell">
      <header class="topbar">
        <div class="brand">
          <div>
            <strong>Seseragi</strong>
            <span>Playground</span>
          </div>
        </div>
        <div class="topbar-actions">
          <label class="sample-picker">
            <span id="sample-picker-label">Sample</span>
            <select id="sample-select" aria-label="サンプルを選択"></select>
          </label>
          <button id="run-button" class="run-button" type="button">
            <span aria-hidden="true">▶</span>
            Run
          </button>
        </div>
      </header>

      <nav class="mobile-tabs" aria-label="Playground panels">
        <button type="button" data-panel-target="code" aria-pressed="true">Code</button>
        <button
          type="button"
          data-panel-target="io"
          aria-label="Input / Output"
          aria-pressed="false"
        >
          I/O
        </button>
      </nav>

      <main class="workspace" data-mobile-panel="code">
        <section class="editor-panel" aria-label="Seseragi editor">
          <div class="panel-heading">
            <div>
              <span class="status-dot" id="status-dot"></span>
              <span id="status-text">Rust compiler ready</span>
            </div>
            <span class="file-name">main.ssrg</span>
          </div>
          <div id="editor" class="editor-host"></div>
        </section>

        <aside class="io-panel" aria-label="Program input and output">
          <section class="input-section">
            <div class="panel-heading">
              <span>Stdin</span>
              <span class="hint">1行に1入力</span>
            </div>
            <textarea
              id="stdin-input"
              rows="4"
              spellcheck="false"
              aria-label="標準入力"
              placeholder="rock&#10;scissors"
            ></textarea>
          </section>
          <section class="output-section">
            <div class="panel-heading">
              <span>Output</span>
              <button id="clear-button" class="text-button" type="button">Clear</button>
            </div>
            <pre id="output" tabindex="0" aria-live="polite">Runを押すと結果がここに表示されます。</pre>
          </section>
        </aside>
      </main>

      <footer>
        <span>Shared Rust driver · WASM · browser runtime</span>
        <a href="https://github.com/KentaroMorishita/seseragi">GitHub</a>
      </footer>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
