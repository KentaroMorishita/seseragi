name: VS Code Extension

on:
  pull_request:
    paths:
      - ".github/workflows/vscode-extension.yml"
      - "crates/seseragi-lsp/**"
      - "extensions/seseragi-spec-preview/**"
      - "crates/seseragi-driver/**"
      - "crates/seseragi-semantics/**"
      - "crates/seseragi-source/**"
  push:
    branches: [main]
    tags: ["vscode-v*"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  package:
    name: ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15
            target: darwin-arm64
          - runner: macos-15-intel
            target: darwin-x64
          - runner: ubuntu-latest
            target: linux-x64
          - runner: windows-latest
            target: win32-x64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9
      - name: Install extension dependencies
        working-directory: extensions/seseragi-spec-preview
        run: bun install --frozen-lockfile
      - name: Test native language server
        run: cargo test -p seseragi-lsp
      - name: Package and verify platform VSIX
        working-directory: extensions/seseragi-spec-preview
        env:
          SESERAGI_EXTENSION_TARGET: ${{ matrix.target }}
          SESERAGI_EXTENSION_OUTPUT: ../../target/seseragi-vscode-${{ matrix.target }}.vsix
        run: bun run package
      - uses: actions/upload-artifact@v4
        with:
          name: seseragi-vscode-${{ matrix.target }}
          path: target/seseragi-vscode-${{ matrix.target }}.vsix
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/vscode-v')
    needs: package
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9
      - name: Verify tag matches extension version
        working-directory: extensions/seseragi-spec-preview
        run: bun scripts/check-release-version.ts
      - uses: actions/download-artifact@v4
        with:
          pattern: seseragi-vscode-*
          path: target/release-vsix
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: target/release-vsix/*.vsix
          generate_release_notes: true
